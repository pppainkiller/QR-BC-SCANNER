<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>POS Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .header { padding: 15px; text-align: center; background: #002b49; font-size: 18px; font-weight: bold; border-bottom: 2px solid #00a8e8; display: flex; justify-content: space-between; align-items: center;}
    .close-btn { background: #c8102e; color: white; border: none; padding: 8px 15px; font-weight: bold; border-radius: 4px; cursor: pointer; }
    #reader { flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; }
    #reader video { object-fit: cover; width: 100%; height: 100%; }
  </style>
</head>
<body>

  <div class="header">
    <span>📷 Scanner Active</span>
    <button class="close-btn" onclick="window.close()">Cancel</button>
  </div>
  <div id="reader"></div>

  <script>
    const html5QrCode = new Html5Qrcode("reader");
    
    // SPEED OPTIMIZATION CONFIGURATION
    const config = { 
      fps: 30, // Tripled the frame scanning rate
      useBarCodeDetectorIfSupported: true, // Enables native hardware acceleration
      qrbox: function(vw, vh) { return { width: Math.min(vw * 0.9, 350), height: 150 }; }, // Widened box for easier barcode capture
      formatsToSupport: [ 
        Html5QrcodeSupportedFormats.QR_CODE, 
        Html5QrcodeSupportedFormats.CODE_128, 
        Html5QrcodeSupportedFormats.CODE_39, 
        Html5QrcodeSupportedFormats.EAN_13, 
        Html5QrcodeSupportedFormats.UPC_A
      ]
    };

    html5QrCode.start({ facingMode: "environment" }, config,
      (decodedText) => {
        // Success! Stop camera, send data back to Google Script, and close popup
        html5QrCode.stop().then(() => {
          if (window.opener) {
            window.opener.postMessage({ code: decodedText.trim() }, '*');
            window.close();
          } else {
            alert("Scanned: " + decodedText + "\n\nPlease close this tab manually.");
          }
        });
      },
      (errorMessage) => { /* Ignore constant read errors as it searches */ }
    ).catch(err => {
      // Fallback to front camera if back fails
      html5QrCode.start({ facingMode: "user" }, config, (text) => {
        html5QrCode.stop().then(() => {
          if (window.opener) {
            window.opener.postMessage({ code: text.trim() }, '*');
            window.close();
          }
        });
      }).catch(err2 => alert("Camera Access Denied. Please allow camera permissions."));
    });
  </script>
</body>
</html>
